# Configuration d'extraction des chaînes traduisibles (pybabel extract).
#
# Extraction :   pybabel extract -F babel.cfg -k _l -o app/translations/messages.pot .
# Initialisation : pybabel init  -i app/translations/messages.pot -d app/translations -l en
# Mise à jour :    pybabel update -i app/translations/messages.pot -d app/translations
# Compilation :    pybabel compile -d app/translations
[python: app/**.py]
[jinja2: app/templates/**.html]
